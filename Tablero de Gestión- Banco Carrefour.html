<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BSF · Tablero de Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.cdnfonts.com/css/ibm-plex-sans');
  @import url('https://fonts.cdnfonts.com/css/ibm-plex-mono');

  :root{
    --cf-blue:#0B4F9C;
    --cf-blue-dark:#063764;
    --cf-blue-pale:#E7F0FA;
    --cf-red:#CC1F45;
    --cf-red-dark:#9E1735;
    --cf-teal:#4A90D9;
    --cf-teal-dark:#2C72BE;
    --paper:#F4F7FA;
    --card:#FFFFFF;
    --ink:#15202B;
    --ink-soft:#5C6B7A;
    --line:#E0E6ED;
    --green:#1E7A4C; --green-bg:#E3F1E8;
    --amber:#9C6B0A; --amber-bg:#FBF0DA;
    --red:#A23A2E;  --red-bg:#FAE6E2;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--paper); color:var(--ink); font-family:'IBM Plex Sans', Arial, sans-serif; -webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono', monospace;}

  /* ---------- HEADER ---------- */
  header{
    background:linear-gradient(115deg, var(--cf-red-dark) 0%, var(--cf-red) 38%, var(--cf-blue) 62%, var(--cf-blue-dark) 100%);
    color:#fff; padding:20px 36px; display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:16px; border-bottom:3px solid var(--cf-blue-dark);
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .mark{width:46px; height:46px;}
  .brand h1{font-size:17px; font-weight:600; letter-spacing:.01em;}
  .brand p{font-size:11px; color:#CFE6F7; letter-spacing:.07em; text-transform:uppercase; margin-top:3px;}
  .period{display:flex; gap:8px; align-items:center;}
  .period .tag{
    font-size:12px; font-family:'IBM Plex Mono',monospace; padding:6px 13px; border-radius:3px;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.28); color:#E3F0FA;
  }
  .period .tag.active{background:var(--cf-red); border-color:var(--cf-red); color:#fff; font-weight:700;}

  /* ---------- STRIP DE ESTADO ---------- */
  .strip{
    background:var(--cf-blue-dark); display:flex; overflow-x:auto;
  }
  .strip button{
    flex:1; min-width:170px; background:none; border:none; cursor:pointer;
    padding:14px 18px; text-align:left; border-right:1px solid rgba(255,255,255,.08);
    color:#BFD6EC; font-family:'IBM Plex Sans',sans-serif;
    border-bottom:3px solid transparent; transition:.15s;
  }
  .strip button:hover{background:rgba(255,255,255,.05);}
  .strip button.active{background:rgba(255,255,255,.07); border-bottom-color:var(--cf-red); color:#fff;}
  .strip .lbl{font-size:11px; letter-spacing:.05em; text-transform:uppercase; opacity:.85;}
  .strip .val{font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:600; margin-top:3px; display:flex; align-items:center; gap:8px;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .dot.green{background:#3FD08A;} .dot.amber{background:#F2C14E;} .dot.red{background:#F08272;}

  /* ---------- MAIN ---------- */
  main{padding:34px 36px 60px; max-width:1280px; margin:0 auto;}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; gap:14px; margin-bottom:6px; flex-wrap:wrap;}
  .section-head h2{font-size:21px; font-weight:700; color:var(--cf-blue-dark);}
  .section-head span{font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .section-sub{font-size:13.5px; color:var(--ink-soft); max-width:760px; margin-bottom:22px; line-height:1.5;}

  .panel{
    display:grid; gap:20px; margin-bottom:26px;
  }
  .panel.cols-1{grid-template-columns:1fr;}
  .panel.cols-2{grid-template-columns:1.1fr .9fr;}
  .panel.cols-3{grid-template-columns:repeat(3, 1fr);}
  @media (max-width:880px){ .panel.cols-2, .panel.cols-3{grid-template-columns:1fr;} }

  .card{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:20px 22px;}
  .card h3{font-size:13px; font-weight:700; color:var(--cf-blue-dark); text-transform:uppercase; letter-spacing:.04em; margin-bottom:14px;}
  .card .chart-box{position:relative; height:230px;}
  .card .chart-box.tall{height:280px;}
  .card .foot-note{font-size:11.5px; color:#8A93A0; margin-top:10px; font-style:italic;}

  /* Stat tiles */
  .stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px;}
  .stat{
    background:var(--cf-blue-pale); border-radius:6px; padding:14px 16px; border-left:4px solid var(--cf-blue);
  }
  .stat.alt{border-left-color:var(--cf-teal);}
  .stat .v{font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:700; color:var(--cf-blue-dark);}
  .stat .l{font-size:11px; color:var(--ink-soft); margin-top:4px; line-height:1.3;}

  /* KPI table-ish legend rows */
  .legend-rows{display:flex; flex-direction:column; gap:10px; margin-top:6px;}
  .legend-row{display:flex; align-items:center; gap:10px; font-size:12.5px;}
  .legend-row .sw{width:11px;height:11px;border-radius:2px; flex-shrink:0;}
  .legend-row .lbl{flex:1; color:var(--ink-soft);}
  .legend-row .num{font-family:'IBM Plex Mono',monospace; font-weight:700; color:var(--ink);}

  .pill{font-size:10px; font-family:'IBM Plex Mono',monospace; padding:2px 8px; border-radius:10px; font-weight:700;}
  .pill.green{background:var(--green-bg); color:var(--green);}
  .pill.amber{background:var(--amber-bg); color:var(--amber);}
  .pill.red{background:var(--red-bg); color:var(--red);}

  .note-box{
    background:#FFFBF0; border:1px solid #F0E3C0; border-left:4px solid var(--cf-teal);
    padding:14px 18px; font-size:13px; line-height:1.55; color:var(--ink); border-radius:5px; margin-bottom:24px;
  }
  .note-box b{color:var(--cf-blue-dark);}

  footer{background:var(--cf-blue-dark); color:#BFD6EC; text-align:center; padding:18px; font-size:11.5px; font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="mark" viewBox="0 0 100 100" fill="none">
      <defs>
        <linearGradient id="cfGrad" x1="0" y1="0" x2="100" y2="100">
          <stop offset="0%" stop-color="#CC1F45"/>
          <stop offset="55%" stop-color="#8C3D7C"/>
          <stop offset="100%" stop-color="#0B4F9C"/>
        </linearGradient>
      </defs>
      <rect x="3" y="3" width="94" height="94" rx="20" fill="url(#cfGrad)"/>
      <path d="M38 28 L20 50 L38 72" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M62 28 L80 50 L62 72" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="50" cy="50" r="6.5" fill="#FFFFFF"/>
    </svg>
    <div>
      <h1>Banco de Servicios Financieros Carrefour S.A.U.</h1>
      <p>Tablero de indicadores de gestión &middot; Banca minorista / fintail</p>
    </div>
  </div>
  <div class="period">
    Ejercicio
    <span class="tag">2023</span>
    <span class="tag">2024</span>
    <span class="tag active">2025</span>
  </div>
</header>

<div class="strip" id="strip"></div>

<main id="main"></main>

<footer>Elaboración propia en base a Estados Financieros, Memoria y Reseña Informativa de BSF al 31.12.2025 — Trabajo Final, Contabilidad y Costos, Maestría en Fintech</footer>

<script>
const C = { blue:'#0B4F9C', blueDark:'#063764', teal:'#00AEEF', tealDark:'#0089BD',
            green:'#1E7A4C', amber:'#9C6B0A', red:'#A23A2E', grey:'#C9D3DC' };

const perspectives = [
  { id:'resumen', name:'Resumen Ejecutivo', status:'green', headline:'$11.563M', sub:'Resultado neto 2025' },
  { id:'eerr', name:'EERR de Gestión', status:'green', headline:'22,28%', sub:'ROE sobre PN' },
  { id:'rent', name:'Rentabilidad', status:'green', headline:'22,28%', sub:'ROE 2025' },
  { id:'riesgo', name:'Riesgo de Crédito', status:'red', headline:'16,1%', sub:'Costo de riesgo' },
  { id:'efi', name:'Eficiencia y Costos', status:'green', headline:'51,2%', sub:'Ratio de eficiencia' },
  { id:'fondeo', name:'Fondeo, Liquidez y Solvencia', status:'green', headline:'45,2%', sub:'Tasa de fondeo prom.' },
  { id:'negocio', name:'Negocio Comercial', status:'amber', headline:'9,3%', sub:'Participación on-us' },
];

/* ---------- STRIP ---------- */
const strip = document.getElementById('strip');
perspectives.forEach((p, i)=>{
  const b = document.createElement('button');
  if(i===0) b.className='active';
  b.innerHTML = `<div class="lbl">${p.name}</div><div class="val"><span class="dot ${p.status}"></span>${p.headline}</div>`;
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.strip button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render(p.id);
  });
  strip.appendChild(b);
});

const main = document.getElementById('main');
let chartInstances = [];
function clearCharts(){ chartInstances.forEach(c=>c.destroy()); chartInstances=[]; }
function mk(id, cfg){ const el=document.getElementById(id); if(!el) return; const c=new Chart(el, cfg); chartInstances.push(c); return c; }

/* ====================================================================== */
function render(id){
  clearCharts();
  main.innerHTML = '';
  if(id==='resumen') renderResumen();
  if(id==='eerr') renderEERR();
  if(id==='rent') renderRent();
  if(id==='riesgo') renderRiesgo();
  if(id==='efi') renderEfi();
  if(id==='fondeo') renderFondeo();
  if(id==='negocio') renderNegocio();
}

function head(title, tag, subtitle){
  const h = document.createElement('div');
  h.innerHTML = `<div class="section-head"><h2>${title}</h2><span>// ${tag}</span></div>
                 <div class="section-sub">${subtitle}</div>`;
  main.appendChild(h);
}
function note(html){
  const n = document.createElement('div');
  n.className='note-box'; n.innerHTML = html;
  main.appendChild(n);
}
function panel(cols){ const d=document.createElement('div'); d.className='panel cols-'+cols; main.appendChild(d); return d; }
function card(parent, w){ const d=document.createElement('div'); d.className='card'; if(w) d.style.gridColumn='span '+w; parent.appendChild(d); return d; }
function toggleDrill(key){
  const rows = document.querySelectorAll('.drill-'+key);
  if(!rows.length) return;
  const hidden = rows[0].style.display === 'none';
  rows.forEach(r=> r.style.display = hidden ? '' : 'none');
  const arrow = document.getElementById('arrow-'+key);
  if(arrow) arrow.textContent = hidden ? '▾' : '▸';
}

/* ---------------- 0. RESUMEN EJECUTIVO ---------------- */
function renderResumen(){
  head('Resumen Ejecutivo', 'portada', 'Los indicadores núcleo que un CEO/CFO debería revisar a diario, con su variación interanual, agrupados por temática. Para el detalle analítico de cada uno, ver las pestañas siguientes.');

  function groupHead(txt){
    const g = document.createElement('div');
    g.style.cssText='font-size:11.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--cf-blue-dark); margin:18px 0 8px;';
    g.textContent = txt;
    main.appendChild(g);
  }
  function tileRow(tiles){
    const p = panel(3);
    tiles.forEach(t=>{
      const c = card(p);
      c.innerHTML = `<div class="stat" style="border-left-color:${t.pill==='red'?C.red:t.pill==='amber'?'#9C6B0A':C.blue}">
        <div class="v">${t.v}</div><div class="l">${t.l}</div>
        <div style="margin-top:8px;"><span class="pill ${t.pill}">${t.d}</span></div>
      </div>`;
    });
  }

  groupHead('Rentabilidad y Resultado');
  tileRow([
    { v:'22,28%', l:'ROE', d:'vs -17,4% en 2024', pill:'green' },
    { v:'3,59%', l:'ROA', d:'vs -2,94% en 2024', pill:'green' },
    { v:'$11.563 MM', l:'Resultado neto del ejercicio', d:'vs -$6.130 MM en 2024', pill:'green' },
  ]);

  groupHead('Riesgo de Crédito');
  tileRow([
    { v:'16,1%', l:'Costo de Riesgo (% cartera prom.)', d:'vs 13,0% en 2024', pill:'red' },
    { v:'39,9%', l:'Cartera en Stage 3 (deteriorada)', d:'principal foco de atención 2025', pill:'red' },
    { v:'12,9%', l:'Cobertura de previsiones (% cartera total)', d:'vs 7,5% en 2024', pill:'amber' },
  ]);

  groupHead('Liquidez y Solvencia');
  tileRow([
    { v:'1,26', l:'Liquidez (Activo cte. / Pasivo cte.)', d:'vs 1,27 en 2024', pill:'amber' },
    { v:'0,23', l:'Solvencia (PN / Pasivo total)', d:'vs 0,14 en 2024', pill:'green' },
    { v:'45,2%', l:'Tasa de fondeo promedio', d:'vs 51,7% en 2024', pill:'green' },
  ]);

  groupHead('Eficiencia y Negocio');
  tileRow([
    { v:'51,2%', l:'Ratio de Eficiencia', d:'vs 67,5% en 2024 (mejora)', pill:'green' },
    { v:'$396.651 MM', l:'Cartera total antes de previsiones', d:'+58% vs 2024', pill:'green' },
    { v:'9,3%', l:'Participación on-us (ventas Carrefour)', d:'vs 9,1% en 2024', pill:'amber' },
  ]);

  note('<b>Lectura ejecutiva —</b> 2025 fue un año de fuerte recuperación de la rentabilidad (ROE +22,3% vs -17,4%) impulsada por la desinflación y el crecimiento de la cartera (+58%), pero con un deterioro del riesgo de crédito (costo de riesgo 16,1% y 39,9% de la deuda en Stage 3) que motivó el endurecimiento de la política de crédito en el 2° semestre. La solvencia mejoró por la capitalización de aportes irrevocables del accionista.');
}

/* ---------------- EERR DE GESTIÓN (formato CVP) Y PUNTO DE EQUILIBRIO ---------------- */

  note('<b>Tip:</b> hacé clic en el ícono ▸ junto a "Ingresos" o "Egresos Financieros" para ver el detalle.');

  c1.innerHTML = `<h3>EERR de Gestión — drill-down hasta el Resultado Neto (millones de $)</h3>

    <colgroup>
      <col style="width:26%;">

    </colgroup>
    <thead>
      <tr style="border-bottom:2px solid var(--cf-blue-dark);">
        <th rowspan="2" style="text-align:left; padding:9px 8px; color:var(--cf-blue-dark); vertical-align:bottom; font-weight:700;">Concepto</th>
        <th colspan="2" style="text-align:center; padding:7px; border-left:1px solid var(--line); font-weight:700; color:var(--cf-blue-dark);">2023</th>
        <th colspan="2" style="text-align:center; padding:7px; border-left:1px solid var(--line); font-weight:700; color:var(--cf-blue-dark);">2024</th>
        <th colspan="2" style="text-align:center; padding:7px; border-left:1px solid var(--line); font-weight:700; color:var(--cf-blue-dark);">2025</th>
        <th colspan="2" style="text-align:center; padding:7px; border-left:2px solid var(--cf-blue-dark); font-weight:700; color:var(--cf-blue-dark);">Var. interanual</th>
      </tr>
      <tr style="border-bottom:1px solid var(--cf-blue-dark); font-size:11px; color:var(--ink-soft); font-weight:600;">
        <th style="text-align:right; padding:5px 8px; border-left:1px solid var(--line);">Importe</th><th style="text-align:right; padding:5px 8px;">%</th>
        <th style="text-align:right; padding:5px 8px; border-left:1px solid var(--line);">Importe</th><th style="text-align:right; padding:5px 8px;">%</th>
        <th style="text-align:right; padding:5px 8px; border-left:1px solid var(--line);">Importe</th><th style="text-align:right; padding:5px 8px;">%</th>
        <th style="text-align:right; padding:5px 8px; border-left:2px solid var(--cf-blue-dark);">24/23</th><th style="text-align:right; padding:5px 8px;">25/24</th>
      </tr>
    </thead>
    <tbody style="font-size:12px; font-feature-settings:'tnum'; font-variant-numeric:tabular-nums;">

      <tr onclick="toggleDrill('ing')" style="cursor:pointer; user-select:none; border-bottom:1px solid var(--line); font-weight:700; background:var(--cf-blue-pale);">
        <td style="padding:7px 8px;"><span id="arrow-ing" style="display:inline-block; width:14px; color:var(--cf-blue-dark);">▸</span>(+) Ingresos</td>
        <td style="text-align:right; border-left:1px solid var(--line);">113.157,5</td><td style="text-align:right;">82,1%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">138.789,1</td><td style="text-align:right;">82,2%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">245.011,1</td><td style="text-align:right;">71,1%</td>
        <td style="text-align:right; border-left:2px solid var(--cf-blue-dark); color:var(--green);">+22,7%</td><td style="text-align:right; color:var(--green);">+76,5%</td>
      </tr>
      <tr class="drill-ing" style="display:none; color:var(--ink-soft); font-style:italic; font-size:11px;">
        <td style="padding:4px 8px 4px 28px;">Ingresos por Intereses</td>
        <td style="text-align:right; border-left:1px solid var(--line);">81.102,6</td><td style="text-align:right;">58,8%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">95.347,1</td><td style="text-align:right;">56,5%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">183.354,3</td><td style="text-align:right;">53,2%</td>
        <td style="text-align:right; border-left:2px solid var(--cf-blue-dark);">+17,6%</td><td style="text-align:right;">+92,3%</td>
      </tr>
      <tr class="drill-ing" style="display:none; color:var(--ink-soft); font-style:italic; font-size:11px;">
        <td style="padding:4px 8px 4px 28px;">Ingresos Netos por Comisiones</td>
        <td style="text-align:right; border-left:1px solid var(--line);">19.118,3</td><td style="text-align:right;">13,9%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">27.709,8</td><td style="text-align:right;">16,4%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">32.739,1</td><td style="text-align:right;">9,5%</td>
        <td style="text-align:right; border-left:2px solid var(--cf-blue-dark);">+44,9%</td><td style="text-align:right;">+18,1%</td>
      </tr>
      <tr class="drill-ing" style="display:none; color:var(--ink-soft); font-style:italic; font-size:11px;">
        <td style="padding:4px 8px 4px 28px;">Otros Ingresos Operativos</td>
        <td style="text-align:right; border-left:1px solid var(--line);">13.105,5</td><td style="text-align:right;">9,5%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">15.756,2</td><td style="text-align:right;">9,3%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">28.936,4</td><td style="text-align:right;">8,4%</td>
        <td style="text-align:right; border-left:2px solid var(--cf-blue-dark);">+20,2%</td><td style="text-align:right;">+83,7%</td>
      </tr>
      <tr class="drill-ing" style="display:none; color:var(--ink-soft); font-style:italic; font-size:11px; border-bottom:1px solid var(--line);">
        <td style="padding:4px 8px 6px 28px;">Diferencia de Cotización</td>
        <td style="text-align:right; border-left:1px solid var(--line);">(168,9)</td><td style="text-align:right;">-0,1%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">(24,0)</td><td style="text-align:right;">-0,0%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">(18,7)</td><td style="text-align:right;">-0,0%</td>
        <td style="text-align:right; border-left:2px solid var(--cf-blue-dark);">n/r</td><td style="text-align:right;">n/r</td>
      </tr>

      <tr onclick="toggleDrill('egr')" style="cursor:pointer; user-select:none; border-bottom:1px solid var(--line);">
        <td style="padding:7px 8px;"><span id="arrow-egr" style="display:inline-block; width:14px; color:var(--cf-blue-dark);">▸</span>(–) Egresos Financieros</td>
        <td style="text-align:right; border-left:1px solid var(--line);">(35.630,8)</td><td style="text-align:right; color:var(--ink-soft);">-25,9%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">(37.184,3)</td><td style="text-align:right; color:var(--ink-soft);">-22,0%</td>
        <td style="text-align:right; border-left:1px solid var(--line);">(80.157,6)</td><td style="text-align:right; color:var(--ink-soft);">-23,3%</td>
        <td style="text-align:right; border-left:2px solid var(--cf-blue-dark); color:var(--red);">+4,4%</td><td style="text-align:right; color:var(--red);">+115,6%</td>
      </tr>

  const c3 = card(p2); c3.innerHTML = `<h3>Liquidez y Solvencia — últimos 3 ejercicios</h3><div class="chart-box" style="height:240px;"><canvas id="ch7b"></canvas></div>
    <div class="foot-note">Liquidez = Activo corriente / Pasivo corriente. Solvencia = Patrimonio Neto / Total del Pasivo. Fuente: Reseña Informativa, índices comparativos.</div>`;

  const p3 = panel(1);
  const c4 = card(p3); c4.innerHTML = `<h3>Costo de fondeo vs. Ingresos por intereses</h3><div class="chart-box" style="height:260px;"><canvas id="ch8"></canvas></div>
    <div class="foot-note">Ratio Egresos/Ingresos por intereses: empeoró de 39,0% (2024) a 43,7% (2025) pese a la baja de la tasa de fondeo nominal — la tasa activa bajó más rápido que el costo de fondeo, comprimiendo el margen (ver "Margen neto por intereses / cartera" en Rentabilidad, que cae de 34,5% a 29,9% en el mismo sentido). Cifras en moneda homogénea 31.12.2025.</div>`;

  const p4 = panel(1);
  const c5 = card(p4); c5.innerHTML = `<h3>Tasa de Fondeo vs. Tasa Activa Promedio (comparación de tasas)</h3><div class="chart-box" style="height:260px;"><canvas id="ch9"></canvas></div>
    <div class="foot-note">Tasa Activa 2024-2025: "tasa activa promedio resultante, considerando todos los productos" (Memoria 2025). Tasa Activa 2023: tasa promedio ponderada de tarjeta de crédito (saldo + cuotas) — Memoria EECC 31.12.2023; no incluye préstamos personales, por lo que no es estrictamente comparable con el dato 2024-2025 (proxy, no la misma definición). El ratio Activa/Fondeo sube de 1,27x (2023) a 2,36x (2025): aunque ambas tasas cayeron fuerte por la desinflación, el spread relativo se amplió.</div>`;

  mk('ch9', { type:'bar',
    data:{ labels:['2023','2024','2025'],
      datasets:[
        { label:'Tasa de Fondeo Promedio', data:[101.9,51.7,45.2], backgroundColor:C.red, borderRadius:4, order:2 },
        { label:'Tasa Activa Promedio (aprox. 2023)', data:[129.9,118.4,106.6], backgroundColor:C.blue, borderRadius:4, order:2 },
        { label:'Ratio Activa / Fondeo', data:[1.27,2.29,2.36], type:'line', borderColor:C.blueDark, backgroundColor:C.blueDark, yAxisID:'y2', tension:.3, order:1 },
      ]},
    options:{ maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom', labels:{font:{size:10.5}}} },
      scales:{ y:{ position:'left', ticks:{callback:v=>v+'%'}, title:{display:true, text:'Tasa anual', font:{size:10}} },
               y2:{ position:'right', min:1, max:2.6, grid:{drawOnChartArea:false}, ticks:{callback:v=>v+'x'}, title:{display:true, text:'Ratio (veces)', font:{size:10}} } } } });

  mk('ch8', { type:'bar',
    data:{ labels:['2023','2024','2025'],
      datasets:[
        { label:'Ingresos por intereses', data:[81102.6,95347.1,183354.3], backgroundColor:C.teal, borderRadius:4, order:2 },
        { label:'Egresos por intereses (costo de fondeo)', data:[35630.8,37184.3,80157.6], backgroundColor:C.red, borderRadius:4, order:2 },
        { label:'Egresos / Ingresos por intereses', data:[43.9,39.0,43.7], type:'line', borderColor:C.blueDark, backgroundColor:C.blueDark, yAxisID:'y2', tension:.3, order:1 },
      ]},
    options:{ maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom', labels:{font:{size:10.5}}} },
      scales:{ y:{ position:'left', title:{display:true, text:'Millones de $', font:{size:10}} },
               y2:{ position:'right', min:30, max:50, grid:{drawOnChartArea:false}, ticks:{callback:v=>v+'%'}, title:{display:true, text:'Ratio Egr./Ing.', font:{size:10}} } } } });

  mk('ch6', { type:'bar',
    data:{ labels:['Fondeo 2025'],
      datasets:[
        { label:'Bancos', data:[41.2], backgroundColor:C.blueDark },
        { label:'Otros pasivos financieros', data:[33.3], backgroundColor:C.teal },
        { label:'Patrimonio neto', data:[20.7], backgroundColor:'#0B4F9C99' },
        { label:'Obligaciones Negociables', data:[4.8], backgroundColor:'#A9C6DE' },
      ]},
    options:{ indexAxis:'y', maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ x:{ stacked:true, max:100, ticks:{callback:v=>v+'%'} }, y:{ stacked:true } } } });

  mk('ch7b', { type:'line',
    data:{ labels:['2023','2024','2025'],
      datasets:[
        { label:'Liquidez (Activo cte. / Pasivo cte.)', data:[1.29,1.27,1.26], borderColor:C.teal, backgroundColor:C.teal+'22', fill:false, tension:.3 },
        { label:'Solvencia (PN / Pasivo total)', data:[0.32,0.14,0.23], borderColor:C.blueDark, backgroundColor:C.blueDark+'22', fill:false, tension:.3, yAxisID:'y2' },
      ]},
    options:{ maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom', labels:{font:{size:10.5}}} },
      scales:{ y:{ position:'left', min:1, max:1.4, title:{display:true, text:'Liquidez (veces)', font:{size:10}} },
               y2:{ position:'right', min:0, max:0.4, grid:{drawOnChartArea:false}, title:{display:true, text:'Solvencia (veces)', font:{size:10}} } } } });
}

/* ---------------- 5. NEGOCIO: dona mix + barras + tiles ---------------- */
function renderNegocio(){
  head('Negocio Comercial', 'vertical', 'Penetración de BSF como medio de pago dentro y fuera del ecosistema Carrefour, y adopción de los productos digitales.');
  note('<b>Lectura del ejercicio —</b> La participación on-us en ventas Carrefour subió levemente (9,1% → 9,3%), pero el mix de consumos se desplazó hacia comercios fuera de la red Carrefour (35,3% → 45,3%), señal de maduración de la tarjeta abierta MasterCard como medio de pago general.');

  const p1 = panel(2);
  const c1 = card(p1); c1.innerHTML = `<h3>Mix de consumos: Carrefour (on-us) vs. otros comercios</h3><div class="chart-box tall"><canvas id="ch8"></canvas></div>`;
  const c2 = card(p1);
  c2.innerHTML = `<h3>Indicadores de adopción — 2025</h3>
    <div class="stat-row">
      <div class="stat"><div class="v">595.932</div><div class="l">Clientes con tarjeta de crédito (+8,3%)</div></div>
      <div class="stat alt"><div class="v">175.180</div><div class="l">Cuentas digitales activas con saldo</div></div>
      <div class="stat"><div class="v">84.861</div><div class="l">Tomadores de préstamos personales</div></div>
      <div class="stat alt"><div class="v">0,02%</div><div class="l">Cartera en manos de los 10 mayores clientes</div></div>
    </div>
    <div class="foot-note" style="margin-top:14px;">La atomización de la cartera (0,02% en los 10 mayores clientes) confirma el perfil de riesgo masivo y diversificado propio del crédito al consumo.</div>`;

  mk('ch8', { type:'bar',
    data:{ labels:['2024','2025'],
      datasets:[
        { label:'Consumos en Carrefour (on-us)', data:[64.7,54.7], backgroundColor:C.blue, borderRadius:4 },
        { label:'Consumos en otros comercios (off-us)', data:[35.3,45.3], backgroundColor:C.teal, borderRadius:4 },
      ]},
    options:{ maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{position:'bottom'} },
      scales:{ x:{ stacked:true, max:100, ticks:{callback:v=>v+'%'} }, y:{ stacked:true } } } });
}

render('resumen');
